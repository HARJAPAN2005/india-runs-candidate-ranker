ai_usage_summary: |
  Used Claude for architecture discussion, code review, scoring-design
  decisions, and debugging throughout development. All engineering decisions
  (feature design, scoring weights, honeypot logic, seniority gating) were
  directed and reviewed by the author. No candidate data was fed to any
  hosted LLM, and the ranking step makes zero LLM calls.

methodology_summary: |
  Our system ranks 100,000 candidates for a Senior AI Engineer role by genuine
  fit, not keyword overlap. The core decision: we build BM25 and dense embeddings
  over candidates' career-history descriptions only — never their self-reported
  skills lists — so a profile listing "vector search" but describing
  churn-prediction work gets no credit. A two-phase design meets the production
  constraints: heavy embedding runs offline (~35 min), while the ranking step
  completes in 4.3 seconds, CPU-only, fully offline. Scoring combines hybrid
  retrieval (rank-percentile normalised) with structural JD-fit adjustments —
  tiered recsys evidence (learning-to-rank and NDCG evaluation weighted far above
  generic A/B testing), product-vs-services career composition, and years-in-range
  fit — then a behavioural availability multiplier from 23 platform signals. Hard
  gates enforce the JD's 5-year seniority floor and remove internally impossible
  "honeypot" profiles via four consistency checks. Reasoning is assembled from
  verified profile facts with zero LLM calls, eliminating hallucination. The
  result: a top-100 shortlist with zero honeypots, zero services-only profiles,
  and zero under-seniority candidates — correctly demoting keyword-stuffers and
  elevating strong candidates who describe their work in plain language rather
  than buzzwords.

